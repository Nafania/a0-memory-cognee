<html>

<head>
    <title>Memory Dashboard</title>
    <script type="module">
        import { store } from "/plugins/memory_cognee/webui/memory-dashboard-store.js";
    </script>
</head>

<body>
    <div x-data>
        <template x-if="$store.memoryDashboardStore">
            <div x-create="$store.memoryDashboardStore.onOpen()" x-destroy="$store.memoryDashboardStore.cleanup()"
                class="memory-dashboard">

                <!-- View Mode Toggle -->
                <div class="view-mode-toggle">
                    <div class="view-mode-tabs">
                        <button class="view-tab" :class="{ active: $store.memoryDashboardStore.viewMode === 'table' }"
                            @click="$store.memoryDashboardStore.switchView('table')">
                            <span class="material-symbols-outlined">table_rows</span>
                            Table View
                        </button>
                        <button class="view-tab" :class="{ active: $store.memoryDashboardStore.viewMode === 'graph' }"
                            @click="$store.memoryDashboardStore.switchView('graph')">
                            <span class="material-symbols-outlined">hub</span>
                            Knowledge Graph
                        </button>
                    </div>

                    <div class="view-mode-dir">
                        <label for="memory-subdir-select">Memory Directory</label>
                        <select id="memory-subdir-select" x-model="$store.memoryDashboardStore.selectedMemorySubdir"
                            @change="$store.memoryDashboardStore.onMemorySubdirChange()"
                            :disabled="$store.memoryDashboardStore.loadingSubdirs">
                            <template x-for="subdir in $store.memoryDashboardStore.memorySubdirs" :key="subdir">
                                <option :value="subdir" x-text="subdir"
                                    :selected="subdir === $store.memoryDashboardStore.selectedMemorySubdir">
                                </option>
                            </template>
                        </select>
                    </div>
                </div>

                <!-- Table View Filters -->
                <div class="filters-header memory-filters-header"
                    x-show="$store.memoryDashboardStore.viewMode === 'table'">
                    <div class="filter-group-inline filter-area">
                        <label for="area-filter">Area</label>
                        <select id="area-filter" x-model="$store.memoryDashboardStore.areaFilter"
                            @change="$store.memoryDashboardStore.searchMemories()">
                            <option value="">All Areas</option>
                            <template x-for="area in $store.memoryDashboardStore.sortedAreaKeys" :key="area">
                                <option :value="area"
                                    x-text="`${area.charAt(0).toUpperCase() + area.slice(1)} (${$store.memoryDashboardStore.availableAreas[area]})`">
                                </option>
                            </template>
                        </select>
                    </div>

                    <div class="filter-group-inline filter-limit">
                        <label for="limit-input">Limit:</label>
                        <input type="number" id="limit-input" x-model.number="$store.memoryDashboardStore.limit"
                            min="10" max="1000" step="10" />
                    </div>

                    <!-- Threshold: not supported by Cognee search API (no score in results) -->
                    <div class="filter-threshold" style="display: none;">
                        <label for="threshold-input">Threshold: <strong
                                x-text="$store.memoryDashboardStore.threshold.toFixed(2)"></strong></label>
                        <input type="range" id="threshold-input" x-model.number="$store.memoryDashboardStore.threshold"
                            min="0" max="1" step="0.01" />
                    </div>

                    <input type="text" id="search-input" x-model="$store.memoryDashboardStore.searchQuery"
                        placeholder="Search memory content..."
                        @keyup.enter="$store.memoryDashboardStore.searchMemories()" />

                    <button class="btn btn-ok btn-search" @click="$store.memoryDashboardStore.searchMemories()"
                        :disabled="$store.memoryDashboardStore.loading || $store.memoryDashboardStore.loadingSubdirs">
                        <span x-show="!$store.memoryDashboardStore.initializingMemory">Search</span>
                        <span x-show="$store.memoryDashboardStore.initializingMemory">Init...</span>
                    </button>

                    <button class="btn btn-cancel btn-clear" @click="$store.memoryDashboardStore.clearSearch()">
                        Clear
                    </button>
                </div>

                <!-- ============ TABLE VIEW ============ -->
                <template x-if="$store.memoryDashboardStore.viewMode === 'table'">
                <div>

                <!-- Loading state -->
                <div x-show="$store.memoryDashboardStore.loading" class="loading-state">
                    <div class="loading-spinner"></div>
                    <span x-show="!$store.memoryDashboardStore.initializingMemory">Searching memories...</span>
                    <span x-show="$store.memoryDashboardStore.initializingMemory">Initializing memory database...</span>
                </div>

                <!-- Memory table -->
                <div x-show="!$store.memoryDashboardStore.loading"
                    class="data-table-container data-table-container-standalone memory-table-container">

                    <!-- Status Bar -->
                    <div class="data-status-bar" x-show="!$store.memoryDashboardStore.loading">
                        <div class="status-info">
                            <span class="status-item">
                                <span class="material-symbols-outlined">database</span>
                                Total: <strong x-text="$store.memoryDashboardStore.totalDbCount"></strong>
                            </span>
                            <span class="status-separator">•</span>
                            <span class="status-item">
                                Filtered: <strong x-text="$store.memoryDashboardStore.totalCount"></strong>
                            </span>
                            <span class="status-separator">•</span>
                            <span class="status-item">
                                Knowledge: <strong x-text="$store.memoryDashboardStore.knowledgeCount"></strong>
                            </span>
                            <span class="status-separator">•</span>
                            <span class="status-item">
                                Conversation: <strong x-text="$store.memoryDashboardStore.conversationCount"></strong>
                            </span>
                        </div>

                        <!-- Pagination -->
                        <div class="status-pagination" x-show="$store.memoryDashboardStore.totalPages > 1">
                            <button class="btn btn-icon" @click="$store.memoryDashboardStore.prevPage()"
                                :disabled="$store.memoryDashboardStore.currentPage === 1" title="Previous Page">
                                <span class="material-symbols-outlined">chevron_left</span>
                            </button>
                            <div class="page-input-group">
                                <label>Page</label>
                                <input type="number" class="page-input"
                                    x-model.number="$store.memoryDashboardStore.currentPage"
                                    @change="$store.memoryDashboardStore.goToPage($store.memoryDashboardStore.currentPage)"
                                    @keyup.enter="$store.memoryDashboardStore.goToPage($store.memoryDashboardStore.currentPage)"
                                    :min="1" :max="$store.memoryDashboardStore.totalPages" />
                                <span class="page-total">of <strong
                                        x-text="$store.memoryDashboardStore.totalPages"></strong></span>
                            </div>
                            <button class="btn btn-icon" @click="$store.memoryDashboardStore.nextPage()"
                                :disabled="$store.memoryDashboardStore.currentPage === $store.memoryDashboardStore.totalPages"
                                title="Next Page">
                                <span class="material-symbols-outlined">chevron_right</span>
                            </button>
                        </div>
                    </div>

                    <!-- Mass action toolbar -->
                    <div x-show="$store.memoryDashboardStore.selectedCount > 0" class="mass-action-toolbar">
                        <div class="selection-info">
                            <span x-text="$store.memoryDashboardStore.selectedCount"></span> memories selected
                        </div>

                        <div class="mass-actions">
                            <button class="btn btn-mass copy" @click="$store.memoryDashboardStore.bulkCopyMemories()"
                                title="Copy Selected Content">
                                <span class="material-symbols-outlined">content_copy</span>
                                Copy
                            </button>

                            <button class="btn btn-mass export"
                                @click="$store.memoryDashboardStore.bulkExportMemories()"
                                title="Export Selected Memories">
                                <span class="material-symbols-outlined">download</span>
                                Export
                            </button>

                            <button class="btn btn-mass delete"
                                @click="$confirmClick($event, () => $store.memoryDashboardStore.bulkDeleteMemories())"
                                title="Delete Selected Memories">
                                <span class="material-symbols-outlined">delete</span>
                                Delete
                            </button>

                            <button class="btn btn-mass clear" @click="$store.memoryDashboardStore.clearSelection()"
                                title="Clear Selection">
                                <span class="material-symbols-outlined">close</span>
                                Clear
                            </button>
                        </div>
                    </div>

                    <div class="table-wrapper">
                        <table class="data-table memory-table">
                            <thead>
                                <tr>
                                    <th class="col-select">
                                        <input type="checkbox" :checked="$store.memoryDashboardStore.allSelected"
                                            :indeterminate="$store.memoryDashboardStore.someSelected && !$store.memoryDashboardStore.allSelected"
                                            @change="$store.memoryDashboardStore.toggleSelectAll()"
                                            title="Select/Deselect All" />
                                    </th>
                                    <th class="col-metadata">Metadata</th>
                                    <th class="col-preview">Preview</th>
                                    <th class="col-actions"></th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="memory in $store.memoryDashboardStore.paginatedMemories"
                                    :key="memory.id">
                                    <tr class="memory-row" :class="{'selected': memory.selected}"
                                        @click="$store.memoryDashboardStore.showMemoryDetails(memory)"
                                        style="cursor: pointer;">
                                        <!-- Selection checkbox -->
                                        <td class="select-cell" @click.stop="memory.selected = !memory.selected">
                                            <input type="checkbox" x-model="memory.selected" />
                                        </td>

                                        <!-- Metadata (merged Area, Timestamp, Source) -->
                                        <td class="metadata-cell">
                                            <div class="metadata-info">
                                                <div class="metadata-row">
                                                    <span class="area-badge"
                                                        :style="`background-color: ${$store.memoryDashboardStore.getAreaColor(memory.area)}`"
                                                        x-text="(memory.area || 'UNKNOWN').toUpperCase()"></span>
                                                </div>
                                                <div class="metadata-row">
                                                    <template x-if="memory.knowledge_source">
                                                        <span class="source-type knowledge">Knowledge</span>
                                                    </template>
                                                    <template x-if="!memory.knowledge_source">
                                                        <span class="source-type conversation">Conversation</span>
                                                    </template>
                                                </div>
                                                <div class="metadata-row metadata-timestamp">
                                                    <span
                                                        x-text="$store.memoryDashboardStore.formatTimestamp(memory.timestamp, true)"
                                                        :title="$store.memoryDashboardStore.formatTimestamp(memory.timestamp, false)"></span>
                                                </div>

                                            </div>
                                        </td>

                                        <!-- Content preview -->
                                        <td class="preview-cell">
                                            <div class="content-preview"
                                                x-text="memory.content_full.substring(0, 200) + (memory.content_full.length > 200 ? '...' : '')">
                                            </div>
                                            <div class="tags" x-show="memory.tags && memory.tags.length > 0">
                                                <template x-for="tag in memory.tags" :key="tag">
                                                    <span class="tag" x-text="tag"></span>
                                                </template>
                                            </div>
                                        </td>

                                        <!-- Actions -->
                                        <td class="actions-cell" @click.stop>
                                            <div class="actions-wrapper">
                                                <button class="btn btn-action copy"
                                                    @click="$store.memoryDashboardStore.copyToClipboard($store.memoryDashboardStore.formatMemoryForCopy(memory))"
                                                    title="Copy Memory">
                                                    <span class="material-symbols-outlined">content_copy</span>
                                                </button>

                                                <button class="btn btn-action delete"
                                                    @click="$confirmClick($event, () => $store.memoryDashboardStore.deleteMemory(memory))"
                                                    title="Delete Memory">
                                                    <span class="material-symbols-outlined">delete</span>
                                                </button>
                                            </div>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>



                    </div>

                    <!-- Mass action toolbar -->
                    <div x-show="$store.memoryDashboardStore.selectedCount > 0" class="mass-action-toolbar">
                        <div class="selection-info">
                            <span x-text="$store.memoryDashboardStore.selectedCount"></span> memories selected
                        </div>

                        <div class="mass-actions">
                            <button class="btn btn-mass copy" @click="$store.memoryDashboardStore.bulkCopyMemories()"
                                title="Copy Selected Content">
                                <span class="material-symbols-outlined">content_copy</span>
                                Copy
                            </button>

                            <button class="btn btn-mass export"
                                @click="$store.memoryDashboardStore.bulkExportMemories()"
                                title="Export Selected Memories">
                                <span class="material-symbols-outlined">download</span>
                                Export
                            </button>

                            <button class="btn btn-mass delete"
                                @click="$confirmClick($event, () => $store.memoryDashboardStore.bulkDeleteMemories())"
                                title="Delete Selected Memories">
                                <span class="material-symbols-outlined">delete</span>
                                Delete
                            </button>

                            <button class="btn btn-mass clear" @click="$store.memoryDashboardStore.clearSelection()"
                                title="Clear Selection">
                                <span class="material-symbols-outlined">close</span>
                                Clear
                            </button>
                        </div>
                    </div>


                    <!-- Status Bar -->
                    <div class="data-status-bar data-status-bar-bottom" x-show="!$store.memoryDashboardStore.loading">
                        <div class="status-info">
                            <span class="status-item">
                                <span class="material-symbols-outlined">database</span>
                                Total: <strong x-text="$store.memoryDashboardStore.totalDbCount"></strong>
                            </span>
                            <span class="status-separator">•</span>
                            <span class="status-item">
                                Filtered: <strong x-text="$store.memoryDashboardStore.totalCount"></strong>
                            </span>
                            <span class="status-separator">•</span>
                            <span class="status-item">
                                Knowledge: <strong x-text="$store.memoryDashboardStore.knowledgeCount"></strong>
                            </span>
                            <span class="status-separator">•</span>
                            <span class="status-item">
                                Conversation: <strong x-text="$store.memoryDashboardStore.conversationCount"></strong>
                            </span>
                        </div>

                        <!-- Pagination -->
                        <div class="status-pagination" x-show="$store.memoryDashboardStore.totalPages > 1">
                            <button class="btn btn-icon" @click="$store.memoryDashboardStore.prevPage()"
                                :disabled="$store.memoryDashboardStore.currentPage === 1" title="Previous Page">
                                <span class="material-symbols-outlined">chevron_left</span>
                            </button>
                            <div class="page-input-group">
                                <label>Page</label>
                                <input type="number" class="page-input"
                                    x-model.number="$store.memoryDashboardStore.currentPage"
                                    @change="$store.memoryDashboardStore.goToPage($store.memoryDashboardStore.currentPage)"
                                    @keyup.enter="$store.memoryDashboardStore.goToPage($store.memoryDashboardStore.currentPage)"
                                    :min="1" :max="$store.memoryDashboardStore.totalPages" />
                                <span class="page-total">of <strong
                                        x-text="$store.memoryDashboardStore.totalPages"></strong></span>
                            </div>
                            <button class="btn btn-icon" @click="$store.memoryDashboardStore.nextPage()"
                                :disabled="$store.memoryDashboardStore.currentPage === $store.memoryDashboardStore.totalPages"
                                title="Next Page">
                                <span class="material-symbols-outlined">chevron_right</span>
                            </button>
                        </div>
                    </div>


                    <!-- No memories message -->
                    <div x-show="$store.memoryDashboardStore.memories.length === 0 && !$store.memoryDashboardStore.message"
                        class="data-empty-state">
                        No memories found matching the current filters.
                    </div>

                    <!-- Initialization message -->
                    <div x-show="$store.memoryDashboardStore.message" class="init-message">
                        <span x-text="$store.memoryDashboardStore.message"></span>
                    </div>

                </div>

                </div>
                </template>
                <!-- ============ END TABLE VIEW ============ -->

                <!-- ============ GRAPH VIEW ============ -->
                <template x-if="$store.memoryDashboardStore.viewMode === 'graph'">
                <div class="graph-view">

                    <!-- Graph Controls Bar -->
                    <div class="graph-controls-bar">
                        <div class="graph-controls-left">
                            <div class="graph-control-group">
                                <label>Layout</label>
                                <select x-model="$store.memoryDashboardStore.graphLayout"
                                    @change="$store.memoryDashboardStore.applyGraphLayout($store.memoryDashboardStore.graphLayout)">
                                    <option value="cose">Force-Directed</option>
                                    <option value="breadthfirst">Hierarchical</option>
                                    <option value="concentric">Concentric</option>
                                    <option value="circle">Circle</option>
                                    <option value="grid">Grid</option>
                                </select>
                            </div>

                            <div class="graph-control-group">
                                <label>Nodes</label>
                                <select x-model="$store.memoryDashboardStore.graphNodeLimit"
                                    @change="$store.memoryDashboardStore.setGraphNodeLimit($store.memoryDashboardStore.graphNodeLimit)">
                                    <option value="100">100</option>
                                    <option value="200">200</option>
                                    <option value="300">300</option>
                                    <option value="500">500</option>
                                    <option value="1000">1000</option>
                                    <option value="99999">All</option>
                                </select>
                            </div>

                            <div class="graph-control-group graph-search-group">
                                <input type="text" x-model="$store.memoryDashboardStore.graphSearchQuery"
                                    placeholder="Search nodes..."
                                    @keyup.enter="$store.memoryDashboardStore.searchGraph()" />
                                <button class="btn btn-sm" @click="$store.memoryDashboardStore.searchGraph()" title="Search">
                                    <span class="material-symbols-outlined">search</span>
                                </button>
                                <button class="btn btn-sm" @click="$store.memoryDashboardStore.clearGraphSearch()"
                                    x-show="$store.memoryDashboardStore.graphSearchQuery" title="Clear search">
                                    <span class="material-symbols-outlined">close</span>
                                </button>
                            </div>
                        </div>

                        <div class="graph-controls-right">
                            <div class="graph-stats">
                                <span class="graph-stat">
                                    <span class="material-symbols-outlined">circle</span>
                                    <span x-text="$store.memoryDashboardStore.graphNodeCount"></span>
                                    <template x-if="$store.memoryDashboardStore.graphTruncated">
                                        <span>/ <span x-text="$store.memoryDashboardStore.graphTotalNodeCount"></span></span>
                                    </template>
                                    nodes
                                </span>
                                <span class="graph-stat">
                                    <span class="material-symbols-outlined">arrow_right_alt</span>
                                    <span x-text="$store.memoryDashboardStore.graphEdgeCount"></span>
                                    <template x-if="$store.memoryDashboardStore.graphTruncated">
                                        <span>/ <span x-text="$store.memoryDashboardStore.graphTotalEdgeCount"></span></span>
                                    </template>
                                    edges
                                </span>
                                <template x-if="$store.memoryDashboardStore.graphTruncated">
                                    <span class="graph-stat graph-stat-warn">
                                        <span class="material-symbols-outlined">warning</span>
                                        truncated
                                    </span>
                                </template>
                            </div>
                            <div class="graph-zoom-controls">
                                <button class="btn btn-icon btn-sm" @click="$store.memoryDashboardStore.graphZoomIn()" title="Zoom In">
                                    <span class="material-symbols-outlined">add</span>
                                </button>
                                <button class="btn btn-icon btn-sm" @click="$store.memoryDashboardStore.graphZoomOut()" title="Zoom Out">
                                    <span class="material-symbols-outlined">remove</span>
                                </button>
                                <button class="btn btn-icon btn-sm" @click="$store.memoryDashboardStore.graphFitView()" title="Fit View">
                                    <span class="material-symbols-outlined">fit_screen</span>
                                </button>
                                <button class="btn btn-icon btn-sm" @click="$store.memoryDashboardStore.loadGraphData()" title="Reload Graph">
                                    <span class="material-symbols-outlined">refresh</span>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Type Filters -->
                    <div class="graph-type-filters" x-show="$store.memoryDashboardStore.graphNodeTypes.length > 0">
                        <span class="type-filter-label">Node Types:</span>
                        <template x-for="nodeType in $store.memoryDashboardStore.graphNodeTypes" :key="nodeType">
                            <label class="type-filter-item">
                                <input type="checkbox"
                                    :checked="$store.memoryDashboardStore.graphTypeFilters[nodeType] !== false"
                                    @change="$store.memoryDashboardStore.graphTypeFilters[nodeType] = $event.target.checked; $store.memoryDashboardStore.filterGraphByType()" />
                                <span class="type-filter-badge"
                                    :style="`background-color: ${$store.memoryDashboardStore._getNodeColor(nodeType)}`"
                                    x-text="nodeType"></span>
                            </label>
                        </template>
                    </div>

                    <!-- Graph Main Area -->
                    <div class="graph-main-area">
                        <!-- Graph Canvas -->
                        <div class="graph-canvas-wrapper">
                            <div x-show="$store.memoryDashboardStore.graphLoading" class="loading-state graph-loading">
                                <div class="loading-spinner"></div>
                                <span>Loading knowledge graph...</span>
                            </div>

                            <div x-show="$store.memoryDashboardStore.graphEmpty && !$store.memoryDashboardStore.graphLoading"
                                class="data-empty-state graph-empty">
                                <span class="material-symbols-outlined" style="font-size: 48px; opacity: 0.4;">hub</span>
                                <p>Knowledge graph is empty.</p>
                                <p style="font-size: 0.85rem; opacity: 0.6;">Run cognify on your memories to build the knowledge graph.</p>
                            </div>

                            <div x-show="$store.memoryDashboardStore.graphError && !$store.memoryDashboardStore.graphLoading"
                                class="data-empty-state graph-error">
                                <span class="material-symbols-outlined" style="font-size: 48px; opacity: 0.4; color: #ef4444;">error</span>
                                <p x-text="$store.memoryDashboardStore.graphError"></p>
                            </div>

                            <div id="cy-graph-container"
                                x-show="!$store.memoryDashboardStore.graphLoading && !$store.memoryDashboardStore.graphEmpty && !$store.memoryDashboardStore.graphError">
                            </div>
                        </div>

                        <!-- Node Details Panel -->
                        <div class="graph-details-panel" x-show="$store.memoryDashboardStore.graphSelectedNode"
                            x-transition>
                            <div class="graph-details-header">
                                <h4>Node Details</h4>
                                <button class="btn btn-icon btn-sm"
                                    @click="$store.memoryDashboardStore.graphSelectedNode = null"
                                    title="Close">
                                    <span class="material-symbols-outlined">close</span>
                                </button>
                            </div>

                            <template x-if="$store.memoryDashboardStore.graphSelectedNode">
                                <div class="graph-details-content">
                                    <div class="detail-field">
                                        <span class="detail-label">Label</span>
                                        <span class="detail-value" x-text="$store.memoryDashboardStore.graphSelectedNode.label"></span>
                                    </div>
                                    <div class="detail-field">
                                        <span class="detail-label">Type</span>
                                        <span class="type-filter-badge"
                                            :style="`background-color: ${$store.memoryDashboardStore._getNodeColor($store.memoryDashboardStore.graphSelectedNode.type)}`"
                                            x-text="$store.memoryDashboardStore.graphSelectedNode.type"></span>
                                    </div>
                                    <div class="detail-field">
                                        <span class="detail-label">ID</span>
                                        <span class="detail-value detail-id" x-text="$store.memoryDashboardStore.graphSelectedNode.id"></span>
                                    </div>

                                    <template x-if="$store.memoryDashboardStore.graphSelectedNode.properties && Object.keys($store.memoryDashboardStore.graphSelectedNode.properties).length > 0">
                                        <div class="detail-section">
                                            <span class="detail-section-title">Properties</span>
                                            <template x-for="[key, val] in Object.entries($store.memoryDashboardStore.graphSelectedNode.properties)" :key="key">
                                                <div class="detail-field">
                                                    <span class="detail-label" x-text="key"></span>
                                                    <span class="detail-value detail-prop-value" x-text="String(val)"></span>
                                                </div>
                                            </template>
                                        </div>
                                    </template>

                                    <template x-if="$store.memoryDashboardStore.graphSelectedNode.neighbors">
                                        <div class="detail-section">
                                            <span class="detail-section-title">
                                                Connections (<span x-text="$store.memoryDashboardStore.graphSelectedNode.neighbors.neighbors.length"></span> neighbors)
                                            </span>
                                            <div class="neighbor-list">
                                                <template x-for="n in $store.memoryDashboardStore.graphSelectedNode._showAllNeighbors ? $store.memoryDashboardStore.graphSelectedNode.neighbors.neighbors : $store.memoryDashboardStore.graphSelectedNode.neighbors.neighbors.slice(0, 20)" :key="n.id">
                                                    <div class="neighbor-item neighbor-clickable"
                                                        @click="$store.memoryDashboardStore.navigateToNode(n.id)"
                                                        :title="'Navigate to ' + n.label">
                                                        <span class="neighbor-dot"
                                                            :style="`background-color: ${$store.memoryDashboardStore._getNodeColor(n.type)}`"></span>
                                                        <span class="neighbor-label" x-text="n.label"></span>
                                                        <span class="neighbor-type" x-text="n.type"></span>
                                                    </div>
                                                </template>
                                                <div x-show="$store.memoryDashboardStore.graphSelectedNode.neighbors.neighbors.length > 20 && !$store.memoryDashboardStore.graphSelectedNode._showAllNeighbors"
                                                    class="neighbor-more neighbor-clickable"
                                                    @click="$store.memoryDashboardStore.graphSelectedNode._showAllNeighbors = true">
